name: Deploy Full App to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm pkg delete "devDependencies.@rolldown/binding-win32-x64-msvc"
          npm pkg delete "devDependencies.@tailwindcss/oxide-win32-x64-msvc"
          npm ci

      - name: Build app
        run: npm run build

      - name: Prepare Pages bundle
        run: |
          BASE=/pokemon-type-training
          rm -rf _site
          mkdir -p _site _site/quiz _site/revision _site/double-battle _site/team-builder
          cp -r .svelte-kit/output/client/_app _site/_app
          cp static/favicon.svg _site/favicon.svg
          cp .svelte-kit/output/prerendered/pages/index.html _site/index.html
          cp .svelte-kit/output/prerendered/pages/quiz.html _site/quiz/index.html
          cp .svelte-kit/output/prerendered/pages/revision.html _site/revision/index.html
          cp .svelte-kit/output/prerendered/pages/double-battle.html _site/double-battle/index.html
          cp .svelte-kit/output/prerendered/pages/team-builder.html _site/team-builder/index.html
          for f in _site/index.html _site/quiz/index.html _site/revision/index.html _site/double-battle/index.html _site/team-builder/index.html; do
            sed -i "s|\"\./|\"$BASE/|g" "$f"
            sed -i "s|new URL(\".\", location).pathname.slice(0, -1)|\"$BASE\"|g" "$f"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
