name: Deploy Full App to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm pkg delete "devDependencies.@rolldown/binding-win32-x64-msvc"
          npm pkg delete "devDependencies.@tailwindcss/oxide-win32-x64-msvc"
          npm ci

      - name: Build app
        run: npm run build

      - name: Prepare Pages bundle
        run: |
          rm -rf _site
          mkdir -p _site _site/quiz _site/revision
          cp -r .svelte-kit/output/client/_app _site/_app
          cp static/favicon.svg _site/favicon.svg
          cp .svelte-kit/output/prerendered/pages/index.html _site/index.html
          cp .svelte-kit/output/prerendered/pages/quiz.html _site/quiz/index.html
          cp .svelte-kit/output/prerendered/pages/revision.html _site/revision/index.html
          sed -i 's|href="./_app/|href="../_app/|g; s|src="./_app/|src="../_app/|g; s|href="./favicon.svg"|href="../favicon.svg"|g' _site/quiz/index.html
          sed -i 's|href="./_app/|href="../_app/|g; s|src="./_app/|src="../_app/|g; s|href="./favicon.svg"|href="../favicon.svg"|g' _site/revision/index.html
          sed -i 's|href="/|href="/pokemon-type-training/|g; s|src="/|src="/pokemon-type-training/|g' _site/index.html
          sed -i 's|href="/|href="/pokemon-type-training/|g; s|src="/|src="/pokemon-type-training/|g' _site/quiz/index.html
          sed -i 's|href="/|href="/pokemon-type-training/|g; s|src="/|src="/pokemon-type-training/|g' _site/revision/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
